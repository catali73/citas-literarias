name: Sync Quotes from Notion

on:
  schedule:
    - cron: '0 * * * *'   # cada hora
  workflow_dispatch:        # también manual desde GitHub

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Fetch quotes from Notion
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
        run: python sync_notion.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add quotes.json
          git diff --staged --quiet || git commit -m "chore: sync quotes from Notion [$(date -u '+%Y-%m-%d %H:%M')]"
          git push
