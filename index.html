<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mis Citas</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Libre+Baskerville:ital@0;1&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0f0e0c;
      --surface: #1a1815;
      --border: #2e2b27;
      --gold: #c9a96e;
      --gold-dim: #8a7050;
      --cream: #f0e8d8;
      --cream-dim: #a09080;
      --red: #c0392b;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg);
      color: var(--cream);
      font-family: 'Jost', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* Grain overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 1000;
      opacity: 0.4;
    }

    /* Header */
    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1.5rem 2.5rem;
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      background: var(--bg);
      z-index: 100;
    }

    .logo {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.1rem;
      font-weight: 300;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--gold);
    }

    .header-actions {
      display: flex;
      gap: 1rem;
      align-items: center;
    }

    .btn-icon {
      background: none;
      border: 1px solid var(--border);
      color: var(--cream-dim);
      padding: 0.5rem 1rem;
      cursor: pointer;
      font-family: 'Jost', sans-serif;
      font-size: 0.72rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .btn-icon:hover {
      border-color: var(--gold);
      color: var(--gold);
    }

    .btn-icon.active {
      background: var(--gold);
      border-color: var(--gold);
      color: var(--bg);
    }

    /* Stats bar */
    .stats {
      display: flex;
      gap: 2rem;
      padding: 0.8rem 2.5rem;
      border-bottom: 1px solid var(--border);
      font-size: 0.7rem;
      letter-spacing: 0.1em;
      color: var(--cream-dim);
      text-transform: uppercase;
    }

    .stats span strong {
      color: var(--gold);
      font-weight: 500;
    }

    /* Filters panel */
    #filters-panel {
      display: none;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 1.5rem 2.5rem;
      gap: 2rem;
      flex-wrap: wrap;
    }

    #filters-panel.open { display: flex; }

    .filter-group {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      min-width: 180px;
    }

    .filter-label {
      font-size: 0.65rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--gold-dim);
    }

    .filter-group select {
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--cream);
      padding: 0.5rem 0.8rem;
      font-family: 'Jost', sans-serif;
      font-size: 0.8rem;
      cursor: pointer;
      outline: none;
    }

    .filter-group select:focus {
      border-color: var(--gold);
    }

    .filter-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 0.4rem;
    }

    .tag {
      padding: 0.3rem 0.7rem;
      border: 1px solid var(--border);
      font-size: 0.65rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.2s;
      color: var(--cream-dim);
    }

    .tag:hover, .tag.active {
      border-color: var(--gold);
      color: var(--gold);
      background: rgba(201, 169, 110, 0.08);
    }

    /* Main quote area */
    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 4rem 2rem;
    }

    .quote-container {
      max-width: 760px;
      width: 100%;
      text-align: center;
      animation: fadeIn 0.5s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .ornament {
      color: var(--gold);
      font-size: 3rem;
      font-family: 'Cormorant Garamond', serif;
      line-height: 1;
      margin-bottom: 2rem;
      opacity: 0.6;
    }

    .quote-text {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(1.4rem, 3vw, 2rem);
      font-style: italic;
      font-weight: 300;
      line-height: 1.7;
      color: var(--cream);
      margin-bottom: 2.5rem;
    }

    .quote-meta {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.3rem;
    }

    .quote-divider {
      width: 40px;
      height: 1px;
      background: var(--gold);
      margin: 0 auto 1rem;
      opacity: 0.5;
    }

    .quote-autor {
      font-size: 0.75rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--gold);
      font-weight: 500;
    }

    .quote-obra {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: 0.95rem;
      color: var(--cream-dim);
    }

    .quote-pagina {
      font-size: 0.65rem;
      letter-spacing: 0.1em;
      color: var(--cream-dim);
      opacity: 0.6;
      margin-top: 0.2rem;
    }

    .quote-categorias {
      display: flex;
      gap: 0.4rem;
      justify-content: center;
      margin-top: 1.2rem;
      flex-wrap: wrap;
    }

    .cat-badge {
      font-size: 0.6rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      border: 1px solid var(--border);
      padding: 0.2rem 0.6rem;
      color: var(--cream-dim);
    }

    /* Quote actions */
    .quote-actions {
      display: flex;
      gap: 1rem;
      justify-content: center;
      margin-top: 3rem;
    }

    .btn {
      background: none;
      border: 1px solid var(--border);
      color: var(--cream-dim);
      padding: 0.7rem 1.5rem;
      cursor: pointer;
      font-family: 'Jost', sans-serif;
      font-size: 0.72rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      transition: all 0.25s;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .btn:hover {
      border-color: var(--gold);
      color: var(--gold);
    }

    .btn-primary {
      background: var(--gold);
      border-color: var(--gold);
      color: var(--bg);
      font-weight: 500;
    }

    .btn-primary:hover {
      background: #d4b87a;
      border-color: #d4b87a;
      color: var(--bg);
    }

    .btn-fav.favorita {
      border-color: var(--red);
      color: var(--red);
    }

    /* No results */
    .no-results {
      text-align: center;
      padding: 4rem;
      color: var(--cream-dim);
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: 1.2rem;
    }

    /* Favorites view */
    .favs-list {
      max-width: 760px;
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 2rem;
      padding-top: 1rem;
    }

    .fav-card {
      border: 1px solid var(--border);
      padding: 2rem;
      position: relative;
      transition: border-color 0.2s;
    }

    .fav-card:hover { border-color: var(--gold-dim); }

    .fav-card .quote-text {
      font-size: 1.1rem;
      text-align: left;
      margin-bottom: 1rem;
    }

    .fav-card-meta {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
    }

    .fav-card-actions {
      display: flex;
      gap: 0.5rem;
    }

    .btn-sm {
      padding: 0.35rem 0.8rem;
      font-size: 0.65rem;
    }

    /* Counter */
    .quote-counter {
      font-size: 0.65rem;
      letter-spacing: 0.1em;
      color: var(--cream-dim);
      opacity: 0.5;
      margin-top: 2rem;
      text-transform: uppercase;
    }

    /* Toast */
    .toast {
      position: fixed;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%) translateY(10px);
      background: var(--gold);
      color: var(--bg);
      padding: 0.8rem 1.5rem;
      font-size: 0.75rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      opacity: 0;
      transition: all 0.3s;
      z-index: 999;
      pointer-events: none;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* Footer */
    footer {
      text-align: center;
      padding: 1.2rem;
      border-top: 1px solid var(--border);
      font-size: 0.65rem;
      letter-spacing: 0.1em;
      color: var(--cream-dim);
      opacity: 0.4;
      text-transform: uppercase;
    }

    @media (max-width: 600px) {
      header { padding: 1rem 1.2rem; }
      .stats { padding: 0.6rem 1.2rem; gap: 1rem; flex-wrap: wrap; }
      #filters-panel { padding: 1rem 1.2rem; }
      main { padding: 2.5rem 1.2rem; }
      .quote-actions { flex-wrap: wrap; }
    }
  </style>
</head>
<body>

  <header>
    <div class="logo">Mis Citas</div>
    <div class="header-actions">
      <button class="btn-icon" id="btn-favs-view" onclick="toggleFavsView()">
        ♡ Favoritas
      </button>
      <button class="btn-icon" id="btn-filters" onclick="toggleFilters()">
        ≡ Filtros
      </button>
    </div>
  </header>

  <div class="stats" id="stats-bar">
    <span><strong id="stat-total">0</strong> citas</span>
    <span><strong id="stat-filtered">0</strong> visibles</span>
    <span><strong id="stat-favs">0</strong> favoritas</span>
  </div>

  <div id="filters-panel">
    <div class="filter-group">
      <div class="filter-label">Autor</div>
      <select id="filter-autor" onchange="applyFilters()">
        <option value="">Todos</option>
      </select>
    </div>
    <div class="filter-group">
      <div class="filter-label">Obra</div>
      <select id="filter-obra" onchange="applyFilters()">
        <option value="">Todas</option>
      </select>
    </div>
    <div class="filter-group">
      <div class="filter-label">Categoría</div>
      <div class="filter-tags" id="filter-cats"></div>
    </div>
    <div class="filter-group" style="justify-content: flex-end; margin-left: auto;">
      <button class="btn btn-sm" onclick="clearFilters()">Limpiar filtros</button>
    </div>
  </div>

  <main id="main-area">
    <div class="quote-container" id="quote-view">
      <div class="ornament">&ldquo;</div>
      <div class="quote-text" id="q-text">Cargando...</div>
      <div class="quote-divider"></div>
      <div class="quote-meta">
        <div class="quote-autor" id="q-autor"></div>
        <div class="quote-obra" id="q-obra"></div>
        <div class="quote-pagina" id="q-pagina"></div>
        <div class="quote-categorias" id="q-cats"></div>
      </div>
      <div class="quote-actions">
        <button class="btn btn-fav" id="btn-fav" onclick="toggleFav()">♡ Favorita</button>
        <button class="btn btn-primary" onclick="nextQuote()">→ Siguiente</button>
        <button class="btn btn-x" onclick="shareOnX()">𝕏 Compartir</button>
      </div>
      <div class="quote-counter" id="q-counter"></div>
    </div>

    <div class="favs-list" id="favs-view" style="display:none;">
      <div id="favs-container"></div>
    </div>

    <div class="no-results" id="no-results" style="display:none;">
      No hay citas con estos filtros.
    </div>
  </main>

  <footer>Sincronizado desde Notion · <span id="last-sync">—</span></footer>
  <div class="toast" id="toast"></div>

  <script>
    let allQuotes = [];
    let filtered = [];
    let currentIndex = 0;
    let favorites = new Set(JSON.parse(localStorage.getItem('citas-favs') || '[]'));
    let showFavs = false;
    let activeCategories = new Set();
    let currentId = null;

    // Load data
    async function loadQuotes() {
      try {
        const res = await fetch('quotes.json?t=' + Date.now());
        allQuotes = await res.json();
        // Merge favorites from localStorage
        allQuotes.forEach(q => {
          if (favorites.has(q.id)) q.favorita = true;
        });
        init();
      } catch(e) {
        document.getElementById('q-text').textContent = 'Error cargando citas. Asegúrate de que quotes.json existe.';
      }
    }

    function init() {
      buildFilters();
      applyFilters();
      updateStats();
    }

    function buildFilters() {
      const autores = [...new Set(allQuotes.map(q => q.autor))].sort();
      const obras = [...new Set(allQuotes.map(q => q.obra))].sort();
      const cats = [...new Set(allQuotes.flatMap(q => q.categorias || []))].sort();

      const selAutor = document.getElementById('filter-autor');
      autores.forEach(a => selAutor.add(new Option(a, a)));

      const selObra = document.getElementById('filter-obra');
      obras.forEach(o => selObra.add(new Option(o, o)));

      const catsEl = document.getElementById('filter-cats');
      cats.forEach(c => {
        const tag = document.createElement('div');
        tag.className = 'tag';
        tag.textContent = c;
        tag.onclick = () => {
          if (activeCategories.has(c)) {
            activeCategories.delete(c);
            tag.classList.remove('active');
          } else {
            activeCategories.add(c);
            tag.classList.add('active');
          }
          applyFilters();
        };
        catsEl.appendChild(tag);
      });

      // Sync last update from quotes.json if metadata exists
      try {
        const sync = document.getElementById('last-sync');
        sync.textContent = 'quotes.json · ' + allQuotes.length + ' citas';
      } catch(e) {}
    }

    function applyFilters() {
      const autor = document.getElementById('filter-autor').value;
      const obra = document.getElementById('filter-obra').value;

      filtered = allQuotes.filter(q => {
        if (autor && q.autor !== autor) return false;
        if (obra && q.obra !== obra) return false;
        if (activeCategories.size > 0) {
          if (!q.categorias || !q.categorias.some(c => activeCategories.has(c))) return false;
        }
        return true;
      });

      currentIndex = 0;
      updateStats();

      if (showFavs) {
        renderFavs();
      } else {
        if (filtered.length === 0) {
          document.getElementById('quote-view').style.display = 'none';
          document.getElementById('no-results').style.display = 'block';
        } else {
          document.getElementById('no-results').style.display = 'none';
          document.getElementById('quote-view').style.display = 'block';
          showRandomQuote();
        }
      }
    }

    function showRandomQuote() {
      if (filtered.length === 0) return;
      const quote = filtered[currentIndex];
      currentId = quote.id;
      renderQuote(quote);
    }

    function renderQuote(q) {
      document.getElementById('q-text').textContent = q.cita;
      document.getElementById('q-autor').textContent = q.autor.toUpperCase();
      document.getElementById('q-obra').textContent = q.obra;
      document.getElementById('q-pagina').textContent = q.pagina ? `p. ${q.pagina}` : '';

      const cats = document.getElementById('q-cats');
      cats.innerHTML = (q.categorias || []).map(c => `<span class="cat-badge">${c}</span>`).join('');

      const isFav = favorites.has(q.id) || q.favorita;
      const btnFav = document.getElementById('btn-fav');
      btnFav.textContent = isFav ? '♥ Favorita' : '♡ Favorita';
      btnFav.classList.toggle('favorita', isFav);

      document.getElementById('q-counter').textContent = `${currentIndex + 1} de ${filtered.length}`;

      // Re-trigger animation
      const container = document.getElementById('quote-view');
      container.style.animation = 'none';
      void container.offsetWidth;
      container.style.animation = '';
    }

    function nextQuote() {
      if (filtered.length === 0) return;
      currentIndex = (currentIndex + 1) % filtered.length;
      showRandomQuote();
    }

    function toggleFav() {
      if (!currentId) return;
      const quote = filtered.find(q => q.id === currentId);
      if (!quote) return;

      if (favorites.has(currentId)) {
        favorites.delete(currentId);
        quote.favorita = false;
      } else {
        favorites.add(currentId);
        quote.favorita = true;
      }

      localStorage.setItem('citas-favs', JSON.stringify([...favorites]));
      updateStats();
      renderQuote(quote);
      showToast(favorites.has(currentId) ? 'Añadida a favoritas' : 'Eliminada de favoritas');
    }

    function shareOnX() {
      const q = filtered[currentIndex];
      if (!q) return;
      const text = `"${q.cita}"\n\n— ${q.autor}, ${q.obra}`;
      const url = `https://twitter.com/intent/tweet?text=${encodeURIComponent(text)}`;
      window.open(url, '_blank', 'width=600,height=400');
    }

    function toggleFilters() {
      const panel = document.getElementById('filters-panel');
      const btn = document.getElementById('btn-filters');
      panel.classList.toggle('open');
      btn.classList.toggle('active');
    }

    function clearFilters() {
      document.getElementById('filter-autor').value = '';
      document.getElementById('filter-obra').value = '';
      activeCategories.clear();
      document.querySelectorAll('.tag').forEach(t => t.classList.remove('active'));
      applyFilters();
    }

    function toggleFavsView() {
      showFavs = !showFavs;
      const btn = document.getElementById('btn-favs-view');
      const quoteView = document.getElementById('quote-view');
      const favsView = document.getElementById('favs-view');

      btn.classList.toggle('active', showFavs);

      if (showFavs) {
        quoteView.style.display = 'none';
        favsView.style.display = 'flex';
        document.getElementById('no-results').style.display = 'none';
        renderFavs();
      } else {
        favsView.style.display = 'none';
        applyFilters();
      }
    }

    function renderFavs() {
      const favQuotes = allQuotes.filter(q => favorites.has(q.id) || q.favorita);
      const container = document.getElementById('favs-container');

      if (favQuotes.length === 0) {
        container.innerHTML = '<div class="no-results">No tienes citas favoritas aún.</div>';
        return;
      }

      container.innerHTML = favQuotes.map(q => `
        <div class="fav-card">
          <div class="quote-text">"${q.cita}"</div>
          <div class="fav-card-meta">
            <div>
              <div class="quote-autor">${q.autor.toUpperCase()}</div>
              <div class="quote-obra" style="font-family:'Cormorant Garamond',serif;font-style:italic;">${q.obra}${q.pagina ? ` · p.${q.pagina}` : ''}</div>
            </div>
            <div class="fav-card-actions">
              <button class="btn btn-sm" onclick="shareCardOnX('${q.id}')">𝕏</button>
              <button class="btn btn-sm" onclick="removeFavFromList('${q.id}')">✕</button>
            </div>
          </div>
        </div>
      `).join('');
    }

    function shareCardOnX(id) {
      const q = allQuotes.find(x => x.id === id);
      if (!q) return;
      const text = `"${q.cita}"\n\n— ${q.autor}, ${q.obra}`;
      window.open(`https://twitter.com/intent/tweet?text=${encodeURIComponent(text)}`, '_blank', 'width=600,height=400');
    }

    function removeFavFromList(id) {
      favorites.delete(id);
      const q = allQuotes.find(x => x.id === id);
      if (q) q.favorita = false;
      localStorage.setItem('citas-favs', JSON.stringify([...favorites]));
      updateStats();
      renderFavs();
    }

    function updateStats() {
      document.getElementById('stat-total').textContent = allQuotes.length;
      document.getElementById('stat-filtered').textContent = filtered.length;
      document.getElementById('stat-favs').textContent = allQuotes.filter(q => favorites.has(q.id) || q.favorita).length;
    }

    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 2000);
    }

    loadQuotes();
  </script>
</body>
</html>
