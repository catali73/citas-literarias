name: Sync Notion → quotes.json

on:
  schedule:
    - cron: '0 * * * *'   # Every hour
  workflow_dispatch:        # Manual trigger desde GitHub

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write       # Needed to commit quotes.json

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Sync Notion database
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
        run: python sync-notion.py

      - name: Commit & push quotes.json if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add quotes.json sync-meta.json
          git diff --staged --quiet || git commit -m "🔄 Sync citas desde Notion [$(date -u '+%Y-%m-%d %H:%M UTC')]"
          git push
