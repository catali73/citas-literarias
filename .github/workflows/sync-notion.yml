# Este workflow ya no es necesario para el funcionamiento principal.
# El servidor Express ahora lee de Notion directamente (con caché de 15 min).
#
# Se mantiene como opción de recarga manual: dispara /api/refresh en el servidor.
# Para usarlo, añade RAILWAY_URL como secret en GitHub.

name: Refrescar caché (manual)

on:
  workflow_dispatch:

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Ping /api/refresh
        run: |
          if [ -n "${{ secrets.RAILWAY_URL }}" ]; then
            curl -s -X POST "${{ secrets.RAILWAY_URL }}/api/refresh" && echo "✅ Caché refrescada"
          else
            echo "ℹ️  RAILWAY_URL no configurado — nada que hacer"
          fi
